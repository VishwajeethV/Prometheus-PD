<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VH4 Aerospace logo (transparent)">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#E8A020"/>
      <stop offset="50%" stop-color="#F5C060"/>
      <stop offset="100%" stop-color="#E8A020"/>
    </linearGradient>
  </defs>
  <g fill="none" fill-rule="evenodd">
    <!-- stylized VH4 mark (simple) -->
    <text x="8" y="78" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700" fill="#000" opacity="0.95">VH4</text>
    <!-- small rocket arc -->
    <path d="M250 18 C285 6, 320 6, 358 24" stroke="url(#g1)" stroke-width="6" stroke-linecap="round" fill="none" />
    <polygon points="358,24 346,20 352,32" fill="#111" />
    <!-- AEROSPACE wordmark -->
    <text x="8" y="108" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#333">AEROSPACE</text>
  </g>
</svg>
